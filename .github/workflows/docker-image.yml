name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "dev", "stg" ]
  workflow_dispatch:
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
  
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}
    
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to VPS
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          REGISTRY: ${{ env.REGISTRY }}
          ENV: ${{ github.ref_name }}
          PORT: ${{ vars.PORT }}
          CONTAINER: ${{ vars.CONTAINER }}
        #  FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        #  FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
        #  FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
        run: |
          # Deploy commands
          ssh -i ~/.ssh/deploy_key ${{ secrets.SSH_USER }}@${{ secrets.SERVER_IP }} << EOF
            echo "🔑 Logging to GHCR..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            echo "📦 Pulling image..."
            docker pull ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "🛑 Stopping old container..."
            docker stop $CONTAINER 2>/dev/null || true
            docker rm $CONTAINER 2>/dev/null || true
            
            echo "🚀 Starting new container on port $PORT..."
            docker run -d \
              --name $CONTAINER \
              --restart unless-stopped \
              -p $PORT:8000 \
              -e APP_NAME=${{ env.CONTAINER }} \
              -e APP_ENV=$ENV \
              --log-opt max-size=10m \
              --log-opt max-file=3 \
              ghcr.io/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
            
            echo "✅ Deployment complete!"
            echo "📋 Container status:"
            docker ps | grep $CONTAINER

            # Dọn dẹp images cũ
            echo "🧹 Cleaning up old images..."
            docker image prune -f
          EOF
